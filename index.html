<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>semogabaik</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #ffffff; min-height: 100vh; }
    .stage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .petals-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .petal { position: absolute; opacity: 0; animation: fall linear infinite; }
    @keyframes fall {
      0%   { transform: translateY(-30px) rotate(0deg); opacity: 0.85; }
      80%  { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(420deg); opacity: 0; }
    }
    .scene-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 320px;
      text-align: center;
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .scene-text { font-family: Georgia, serif; font-size: 18px; line-height: 1.75; color: #111; font-weight: 400; white-space: pre-wrap; }
    .scene-text.small  { font-size: 14px; color: #666; }
    .scene-text.big    { font-size: 28px; font-weight: 500; color: #111; }
    .scene-text.italic { font-style: italic; color: #888; font-size: 15px; }
    .tap-hint {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      transition: opacity 0.4s;
      font-family: sans-serif;
    }
    .progress { position: absolute; bottom: 0; left: 0; height: 2px; background: #ddd; z-index: 2; transition: width 0.4s ease; }
    .end-note { font-size: 12px; color: #bbb; margin-top: 1.5rem; font-family: sans-serif; }
    .music-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      background: none;
      border: 0.5px solid #ddd;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #aaa;
      font-size: 16px;
      transition: border-color 0.2s, color 0.2s;
    }
    .music-btn:hover { border-color: #aaa; color: #555; }
    .music-btn.playing { color: #e07080; border-color: #e8b0b8; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .music-btn.playing i { animation: spin 3s linear infinite; }
  </style>
</head>
<body>
<div class="stage" id="stage" onclick="handleTap()">

  <button class="music-btn" id="musicBtn" onclick="toggleMusic(event)" title="Putar / pause musik">
    <i class="ti ti-music" aria-hidden="true"></i>
  </button>

  <audio id="bgMusic" src="Main Theme (From Konatsu and Hiyori).mp3" loop preload="auto"></audio>

  <div class="petals-bg" id="petalsContainer"></div>

  <div class="scene-box" id="sceneBox">
    <p class="scene-text" id="sceneText">sebuah pesan singkat</p>
  </div>

  <div class="progress" id="progress" style="width:0%"></div>

  <div class="tap-hint" id="tapHint">
    <i class="ti ti-hand-finger" aria-hidden="true"></i>
    <span>tekan di mana saja</span>
  </div>
</div>

<script>
  var scenes = [
    { text: "Untuk Si MAANIIISSSS dengan\nsegala kesibukannya",                                        cls: "medium"       },
    { text: "Semangat terus yaaa",                                                            cls: "big"    },
    { text: "Walaupun terkadang menunggumu bisa begitu melelahkan",    cls: "medium"  },
    { text: "Dan cukup menyakitkan😞",    cls: "medium"  },
    { text: "Tapi",                                                                            cls: "big"    },
    { text: "Untung belum dikenai biaya parkir",                                               cls: "medium"       },
    { text: "Bercanda😂",                                                                      cls: "italic" },
    { text: "Mencintaimu tidak pernah melelahkan💛💛💛",                                      cls: "medium"       },
    { text: "sorry alay sedikit",                                                                      cls: "italic" },
    { text: "Terima kasih, dan Semangat Terus maaniiissss🥰",                                                cls: "medium"       },
    { text: "ohh iya, hampir lupa",                                                cls: "italic"       },
    { text: "Si mik titip pesan",                                                cls: "medium"       },
    { text: "Sekali-kali kasih kabar duluan,\ngitu katanya",                                                cls: "medium"       },
    { text: "Aneh yaa",                                                cls: "italic"       },
    { text: "Dia pernah bilang juga kalau dia\nINGIN SEKALI ketemuan atau telfonan",                                                cls: "medium"       },
    { text: "Kata gua mah, lah kenapa gak minta langsung. Itu kan pacar lu sendiri",                                                cls: "medium"       },
    { text: "Tapi unik anak satu itu, syukur dia\nbaik hati, sabar, tulus orangnya lalu\nganteng lagi",                                                cls: "medium"       },
    { text: "Jadi begitu ineessss... pesan dari si mik. babaiii👋👋",                                                cls: "medium"       },
  ];

  var current = -1;
  var total = scenes.length;
  var done = false;
  var musicStarted = false;

  var audio = document.getElementById('bgMusic');
  var musicBtn = document.getElementById('musicBtn');

  function startMusic() {
    if (!musicStarted) {
      audio.volume = 0.5;
      audio.play().then(function() {
        musicStarted = true;
        musicBtn.classList.add('playing');
      }).catch(function() {});
    }
  }

  function toggleMusic(e) {
    e.stopPropagation();
    if (audio.paused) {
      audio.play();
      musicBtn.classList.add('playing');
    } else {
      audio.pause();
      musicBtn.classList.remove('playing');
    }
  }

  function handleTap() {
    startMusic();
    nextScene();
  }

  function nextScene() {
    if (done) return;
    current++;

    if (current >= total) {
      done = true;
      document.getElementById('tapHint').style.display = 'none';
      document.getElementById('progress').style.width = '100%';
      var box = document.getElementById('sceneBox');
      box.style.animation = 'none';
      box.offsetHeight;
      box.style.animation = 'fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards';
      box.innerHTML = '<p class="scene-text" style="font-size:36px;">🌸</p>kalau ada yang terlewat coba refresh🙂<p class="end-note"></p>';
      return;
    }

    var s = scenes[current];
    document.getElementById('progress').style.width = (((current + 1) / total) * 100).toFixed(0) + '%';

    var box = document.getElementById('sceneBox');
    box.style.animation = 'none';
    box.offsetHeight;
    box.style.animation = 'fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards';

    var t = document.getElementById('sceneText');
    t.textContent = s.text;
    t.className = 'scene-text ' + s.cls;

    if (current === total - 1) {
      document.getElementById('tapHint').style.opacity = '0';
    }
  }

  var flowers = ['🌸', '🌼', '🌺', '🌷', '🌻'];
  var cont = document.getElementById('petalsContainer');
  for (var i = 0; i < 20; i++) {
    var p = document.createElement('span');
    p.textContent = flowers[i % flowers.length];
    p.style.position = 'absolute';
    p.style.opacity = '0';
    p.style.fontSize = (14 + Math.random() * 12) + 'px';
    p.style.left = (Math.random() * 100) + '%';
    p.style.animation = 'fall ' + (7 + Math.random() * 8) + 's ' + (Math.random() * 10) + 's linear infinite';
    cont.appendChild(p);
  }
</script>
</body>
</html>
